name: VoiceUp Local Release Pipeline

on:
  push:
    branches:
      - main
      - prod
  workflow_dispatch:

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for creating GitHub Releases
      
    steps:
      - name: 🏗 Setup repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: ☕ Setup Java 26
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '26'

      - name: 🏗 Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm config set legacy-peer-deps true && npm ci

      - name: 🚀 Build Android APK Locally
        run: |
          # The --local flag ensures the compilation happens right here on GitHub's free runners using 0/30 Expo quota!
          eas build --platform android --profile preview --local --non-interactive --output app-release.apk

      - name: 🔢 Generate Release Timestamp
        id: timestamp
        run: |
          # Outputs the current UTC date like 2026-05-18 to use in the Release Title
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          # Outputs a unique string for the actual tag parameter (e.g. build-123)
          echo "tag=build-${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT

      - name: 🎉 Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.timestamp.outputs.tag }}
          name: "Release v${{ steps.timestamp.outputs.date }}"
          generate_release_notes: true
          files: app-release.apk
